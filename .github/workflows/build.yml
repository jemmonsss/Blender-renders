name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Update data.json
        run: |
          python3 << 'EOF'
          import os
          import json
          from pathlib import Path
          
          SUPPORTED_EXTENSIONS = {'.jpg', '.jpeg', '.png', '.mp4'}
          RENDERS_DIR = Path('renders')
          DATA_FILE = RENDERS_DIR / 'data.json'
          
          def scan_directory(directory):
              result = {}
              files = []
              
              if not directory.exists():
                  return result
              
              for item in directory.iterdir():
                  if item.is_file() and item.suffix.lower() in SUPPORTED_EXTENSIONS:
                      files.append(item.name)
              
              files.sort()
              
              subdirs = {}
              for item in directory.iterdir():
                  if item.is_dir() and item.name != '.git':
                      subdir_name = item.name
                      subdir_content = scan_directory(item)
                      if subdir_content:
                          subdirs[subdir_name] = subdir_content
              
              if files or subdirs:
                  if files:
                      result['_files'] = files
                  result.update(subdirs)
              
              return result
          
          data = {}
          if RENDERS_DIR.exists():
              for category_dir in RENDERS_DIR.iterdir():
                  if category_dir.is_dir() and category_dir.name != '.git':
                      category_name = category_dir.name
                      category_content = scan_directory(category_dir)
                      if category_content:
                          data[category_name] = category_content
          
          with open(DATA_FILE, 'w', encoding='utf-8') as f:
              json.dump(data, f, indent=2)
          
          print(f"Updated {DATA_FILE}")
          EOF
      
      - name: Commit updated data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add renders/data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update data.json [skip ci]"
          git push
      
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      
      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
